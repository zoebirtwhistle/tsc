<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>After Sunset – Mixer</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 40px auto;
  text-align: center;
}

.controls {
  margin: 20px 0;
}

button {
  padding: 10px 14px;
  margin: 5px;
}

#mixer {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.channel {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 80px;
}

.fader {
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
}

input[type=range].vertical {
  transform: rotate(-90deg);
  width: 140px;
  height: 20px;
  margin: 60px 0;
}

label {
  font-size: 14px;
  margin-bottom: 5px;
}
.smallbtn {
  width: 40px;
  margin-top: 5px;
  font-size: 12px;
}

.smallbtn {
  width: 40px;
  margin-top: 5px;
  font-size: 12px;
  background: #eee;
  border: 1px solid #aaa;
  cursor: pointer;
}

.smallbtn.muted {
  background: #2ecc71;
  color: white;
  border-color: #27ae60;
}

.smallbtn.solo {
  background: #f1c40f;
  color: black;
  border-color: #d4ac0d;
}
  
  .smallbtn.solo-muted {
  background: #2ecc71;
  opacity: 0.6;
  color: white;
  border-color: #27ae60;
}
</style>
</head>

<body>

<p><a href="index.html">Back</a></p>
<h1>Ethel Smyth – After Sunset</h1>

<a href="Smyth - After Sunset SATB Vocal Score.pdf">Download score</a>

<div class="controls">

  <button onclick="playAll()">Play</button>
  <button onclick="pauseAll()">Pause</button>

  <br><br>

  <label>Playback Position</label><br>
  <input type="range" id="scrubber"
         min="0" max="1" step="0.01" value="0"
         oninput="seekAll(this.value)">
</div>

<div id="mixer"></div>

<script>

let tracks = [
  { name: "Soprano", file: "assop.mp3" },
  { name: "Alto", file: "asalto.mp3" },
  { name: "Tenor", file: "astenor.mp3" },
  { name: "Bass", file: "asbass.mp3" },
  { name: "Piano", file: "aspiano.mp3" },
  { name: "MASTER", file: null }
];

let audioCtx;
let masterGain;
let duration = 0;

let isPlaying = false;
let startTime = 0;
let pauseTime = 0;

window.addEventListener("DOMContentLoaded", buildUI);

function buildUI() {
  const mixer = document.getElementById("mixer");

  tracks.forEach((t, i) => {

    if (t.name === "MASTER") {
      const div = document.createElement("div");
      div.className = "channel";

      div.innerHTML = `
        <label>MASTER</label>

        <div class="fader">
          <input type="range"
            class="vertical"
            min="0" max="1" step="0.01"
            value="1"
            oninput="setMaster(this.value)">
        </div>
      `;

      mixer.appendChild(div);
      return;
    }
    
    t.volume = 1;
    t.mute = false;
    t.solo = false;

    const div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
      <label>${t.name}</label>

      <div class="fader">
        <input type="range"
          class="vertical"
          min="0" max="1" step="0.01"
          value="1"
          oninput="setVolume(${i}, this.value)">
      </div>

      <button class="smallbtn" id="mute-${i}" onclick="toggleMute(${i})">M</button>
      <button class="smallbtn" id="solo-${i}" onclick="toggleSolo(${i})">S</button>
    `;

    mixer.appendChild(div);
  });
}

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  tracks.forEach((t, i) => {

    const audio = new Audio(t.file);

    const source = audioCtx.createMediaElementSource(audio);
    const gain = audioCtx.createGain();

    t.audio = audio;
    t.gain = gain;

    source.connect(gain);
    gain.connect(masterGain);

    audio.addEventListener("loadedmetadata", () => {
      duration = Math.max(duration, audio.duration);
      document.getElementById("scrubber").max = duration;
    });
  });
}

function updateMix() {
  const anySolo = tracks.some(t => t.solo);

  tracks.forEach(t => {
    let level = t.volume;

    if (anySolo) {
      level = t.solo ? level : 0;
    }

    if (t.mute) {
      level = 0;
    }

    t.gain.gain.value = level;
  });
  updateButtonUI();
}

function setVolume(i, v) {
  tracks[i].volume = parseFloat(v);
  updateMix();
}

function toggleMute(i) {
  tracks[i].mute = !tracks[i].mute;

  const btn = document.getElementById(`mute-${i}`);
  btn.classList.toggle("muted", tracks[i].mute);

  updateMix();
  updateButtonUI();
}

function toggleSolo(i) {
  tracks[i].solo = !tracks[i].solo;

  const btn = document.getElementById(`solo-${i}`);
  btn.classList.toggle("solo", tracks[i].solo);

  updateMix();
  updateButtonUI();
}

function setMaster(v) {
  if (masterGain) {
    masterGain.gain.value = parseFloat(v);
  }
}

function playAll() {
  if (!audioCtx) initAudio();
  audioCtx.resume();

  const offset = pauseTime || 0;
  startTime = audioCtx.currentTime - offset;

  tracks.forEach(t => {
    t.audio.currentTime = offset;
    t.audio.play();
  });

  isPlaying = true;
  updateScrubber();
}

function pauseAll() {
  tracks.forEach(t => t.audio.pause());

  pauseTime = audioCtx.currentTime - startTime;
  isPlaying = false;
}

function updateScrubber() {
  if (!isPlaying) return;

  const scrubber = document.getElementById("scrubber");

  const current = audioCtx.currentTime - startTime;

  scrubber.value = Math.min(current, duration);

  requestAnimationFrame(updateScrubber);
}
  
function updateButtonUI() {
  const anySolo = tracks.some(t => t.solo);

  tracks.forEach((t, i) => {
    const muteBtn = document.getElementById(`mute-${i}`);

    if (!muteBtn) return;

    muteBtn.classList.remove("muted", "solo-muted");

    if (t.mute) {
      muteBtn.classList.add("muted");
      return;
    }

    if (anySolo && !t.solo) {
      muteBtn.classList.add("solo-muted");
    }
  });
}

function seekAll(v) {
  if (!audioCtx) return;

  const t = parseFloat(v);

  pauseTime = t;

  tracks.forEach(tr => {
    tr.audio.currentTime = t;
  });

  if (isPlaying) {
    startTime = audioCtx.currentTime - t;
  }
  
}

</script>

</body>
</html>
