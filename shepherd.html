<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
<title>The Shepherd – Mixer</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 40px auto;
  text-align: center;
}

.controls {
  margin: 20px 0;
}

#scrubber {
  width: 100%;
  max-width: 600px;
}
  
  .scrubber-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 10px;
}
  
button {
  padding: 10px 14px;
  margin: 5px;
}

#mixer {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.channel {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 8px;
}

.strip-row {
  display: flex;
  align-items: center;
  gap: 2px;
}

.fader {
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fader-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
  .button-row {
  display: flex;
  gap: 3px;
  justify-content: center;
}

 .vu {
  width: 12px;
  height: 140px;
  background: #222;
  margin-left: 2px;
  margin-right: 0;
}

input[type=range].vertical {
  transform: rotate(-90deg);
  width: 140px;
  height: 20px;
  margin: 60px 0;
}

label {
  font-size: 14px;
  margin-bottom: 5px;
}

.smallbtn {
  width: 30px;
  font-size: 12px;
  justify-content: center;
  align-items: center;
  background: #eee;
  border: 1px solid #aaa;
  cursor: pointer;
}

.smallbtn.muted {
  background: #2ecc71;
  color: white;
  border-color: #27ae60;
}

.smallbtn.solo {
  background: #f1c40f;
  color: black;
  border-color: #d4ac0d;
}
  
  .smallbtn.solo-muted {
  background: #2ecc71;
  opacity: 0.6;
  color: white;
  border-color: #27ae60;
}
</style>
</head>

<body>

<p><a href="index.html"><b><--- Back</b></a></p>
<h1>Avril Coleridge-Taylor – <i>The Shepherd</i></h1>

<a href="theshepherd/The Shepherd SATB.pdf">Download score</a>

<div class="controls">

  <button onclick="playAll()">Play</button>
  <button onclick="pauseAll()">Pause</button>

  <br><br>

<div class="scrubber-block">
  <label>Playback Position</label><br>
  <input type="range" id="scrubber"
         min="0" max="1" step="0.01" value="0"
         oninput="seekAll(this.value)">
</div>
  
</div>

<div id="mixer"></div>

<script>

let tracks = [
  { name: "Soprano", file: "theshepherd/sop.mp3" },
  { name: "Alto", file: "theshepherd/alto.mp3" },
  { name: "Tenor", file: "theshepherd/tenor.mp3" },
  { name: "Bass", file: "theshepherd/bass.mp3" },
  { name: "Piano", file: "theshepherd/piano.mp3" }
  
];

let audioCtx;
let masterGain;
let duration = 0;

let isPlaying = false;
let startTime = 0;
let pauseTime = 0;

window.addEventListener("DOMContentLoaded", buildUI);

function buildUI() {
  const mixer = document.getElementById("mixer");

  tracks.forEach((t, i) => {

    const div = document.createElement("div");
    div.className = "channel";

    t.volume = 0.8;
    t.mute = false;
    t.solo = false;

    div.innerHTML = `
      <div class="strip-row">
      <div class="fader-col">

        <label>${t.name}</label>

        <input type="range"
          class="vertical"
          min="0" max="1" step="0.01"
          value="0.8"
          oninput="setVolume(${i}, this.value)">

        <div class="button-row">
        <button class="smallbtn" id="mute-${i}" onclick="toggleMute(${i})">M</button>
        <button class="smallbtn" id="solo-${i}" onclick="toggleSolo(${i})">S</button>
        </div>

      </div>

      <canvas id="vu-${i}" class="vu" width="12" height="140"></canvas>
      </div>
    `;

    mixer.appendChild(div);
  });
}

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  tracks.forEach((t, i) => {

    const audio = new Audio(t.file);

    const source = audioCtx.createMediaElementSource(audio);
    const gain = audioCtx.createGain();


    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    
    t.audio = audio;
    t.gain = gain;
    t.analyser = analyser;

    source.connect(gain);
    gain.connect(analyser);
    analyser.connect(masterGain);

    audio.addEventListener("loadedmetadata", () => {
      duration = Math.max(duration, audio.duration);
      document.getElementById("scrubber").max = duration;

    const masterAnalyser = audioCtx.createAnalyser();
masterAnalyser.fftSize = 1024;

masterGain.connect(masterAnalyser);
masterAnalyser.connect(audioCtx.destination);

window.masterAnalyser = masterAnalyser;
      
    });
  });
updateMix()

}

function updateMix() {
  const anySolo = tracks.some(t => t.solo);

  tracks.forEach(t => {
    let level = t.volume;

    if (anySolo) {
      level = t.solo ? level : 0;
    }

    if (t.mute) {
      level = 0;
    }

    t.gain.gain.value = level;
  });
  updateButtonUI();
}

function setVolume(i, v) {
  tracks[i].volume = parseFloat(v);
  updateMix();
}

function toggleMute(i) {
  tracks[i].mute = !tracks[i].mute;

  const btn = document.getElementById(`mute-${i}`);
  btn.classList.toggle("muted", tracks[i].mute);

  updateMix();
  updateButtonUI();
}

function toggleSolo(i) {
  tracks[i].solo = !tracks[i].solo;

  const btn = document.getElementById(`solo-${i}`);
  btn.classList.toggle("solo", tracks[i].solo);

  updateMix();
  updateButtonUI();
}

function setMaster(v) {
  if (masterGain) {
    masterGain.gain.value = parseFloat(v);
  }
}

function playAll() {
  if (!audioCtx) initAudio();
  audioCtx.resume();

  const offset = pauseTime || 0;
  startTime = audioCtx.currentTime - offset;

  tracks.forEach(t => {
    t.audio.currentTime = offset;
    t.audio.play();
  });

  isPlaying = true;
  updateScrubber();
  drawVUMeters();
  updateMix();
}

function pauseAll() {
  tracks.forEach(t => t.audio.pause());

  pauseTime = audioCtx.currentTime - startTime;
  isPlaying = false;
}

function updateScrubber() {
  if (!isPlaying) return;

  const scrubber = document.getElementById("scrubber");

  const current = audioCtx.currentTime - startTime;

  scrubber.value = Math.min(current, duration);

  requestAnimationFrame(updateScrubber);
}
  
function updateButtonUI() {
  const anySolo = tracks.some(t => t.solo);

  tracks.forEach((t, i) => {
    const muteBtn = document.getElementById(`mute-${i}`);

    if (!muteBtn) return;

    muteBtn.classList.remove("muted", "solo-muted");

    if (t.mute) {
      muteBtn.classList.add("muted");
      return;
    }

    if (anySolo && !t.solo) {
      muteBtn.classList.add("solo-muted");
    }
  });
}
  
function drawVUMeters() {
  tracks.forEach((t, i) => {

    if (!t.analyser) return;

    const canvas = document.getElementById(`vu-${i}`);
    if (!canvas) return;

    const ctx = canvas.getContext("2d");

    const data = new Uint8Array(t.analyser.fftSize);
    t.analyser.getByteTimeDomainData(data);

    let sum = 0;

    for (let j = 0; j < data.length; j++) {
      const v = (data[j] - 128) / 128;
      sum += v * v;
    }

    const rms = Math.sqrt(sum / data.length);

    const level = Math.min(rms * 3.5, 1);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle =
      level > 0.8 ? "#e74c3c" :
      level > 0.5 ? "#f1c40f" :
                    "#2ecc71";

    const h = level * canvas.height;

    ctx.fillRect(0, canvas.height - h, canvas.width, h);
  });

  requestAnimationFrame(drawVUMeters);
}

function drawMasterVU() {
  if (!window.masterAnalyser) return;

  const canvas = document.getElementById("masterVu");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");

  const data = new Uint8Array(masterAnalyser.fftSize);
  masterAnalyser.getByteTimeDomainData(data);

  let sum = 0;

  for (let i = 0; i < data.length; i++) {
    const v = (data[i] - 128) / 128;
    sum += v * v;
  }

  const rms = Math.sqrt(sum / data.length);

  const level = Math.min(rms * 3.5, 1);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle =
    level > 0.85 ? "#e74c3c" :
    level > 0.55 ? "#f1c40f" :
                   "#2ecc71";

  ctx.fillRect(0, 0, level * canvas.width, canvas.height);

  requestAnimationFrame(drawMasterVU);
}

  
function seekAll(v) {
  if (!audioCtx) return;

  const t = parseFloat(v);

  pauseTime = t;

  tracks.forEach(tr => {
    tr.audio.currentTime = t;
  });

  if (isPlaying) {
    startTime = audioCtx.currentTime - t;
  }
  
}

</script>

</body>
</html>
