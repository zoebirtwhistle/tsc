<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>After Sunset – Mixer</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 40px auto;
  text-align: center;
}

#scrubber {
  width: 100%;
  max-width: 600px;
}

.scrubber-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 10px;
}

button {
  padding: 10px 14px;
  margin: 5px;
}

#mixer {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

/* CHANNEL STRIP */
.channel {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 8px;
}

.strip-row {
  display: flex;
  align-items: center;
  gap: 4px;
}

.fader-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

/* VU */
.vu {
  width: 12px;
  height: 140px;
  background: #222;
}

/* FADER */
input[type=range].vertical {
  transform: rotate(-90deg);
  width: 140px;
  height: 20px;
  margin: 60px 0;
}

/* BUTTONS */
.button-row {
  display: flex;
  gap: 6px;
  justify-content: center;
}

.smallbtn {
  width: 60px;
  height: 26px;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* STATES */
.smallbtn.muted {
  background: #2ecc71;
  color: white;
}

.smallbtn.solo {
  background: #f1c40f;
  color: black;
}

.smallbtn.solo-muted {
  background: #2ecc71;
  opacity: 0.5;
  color: white;
}

/* MASTER */
.master-strip {
  display: flex;
  flex-direction: column;
  align-items: center;
}
</style>
</head>

<body>
<p><a href="index.html"><b>Home</b></a></p>
<h1>Ethel Smyth – After Sunset</h1>

<button onclick="playAll()">Play</button>
<button onclick="pauseAll()">Pause</button>

<div class="scrubber-block">
  <label>Playback Position</label>
  <input type="range" id="scrubber"
         min="0" max="1" step="0.01" value="0"
         oninput="seekAll(this.value)">
</div>

<div id="mixer"></div>

<script>

const tracks = [
  { name: "Soprano", file: "assop.mp3" },
  { name: "Alto", file: "asalto.mp3" },
  { name: "Tenor", file: "astenor.mp3" },
  { name: "Bass", file: "asbass.mp3" },
  { name: "Piano", file: "aspiano.mp3" }
];

let audioCtx;
let masterGain;
let duration = 0;

let isPlaying = false;
let startTime = 0;
let pauseTime = 0;

window.addEventListener("DOMContentLoaded", buildUI);

/* ---------------- UI ---------------- */

function buildUI() {
  const mixer = document.getElementById("mixer");

  // MASTER
  const masterDiv = document.createElement("div");
  masterDiv.className = "channel";

  masterDiv.innerHTML = `
    <div class="master-strip">

      <label>MASTER</label>

      <input type="range"
        class="vertical"
        min="0" max="1" step="0.01"
        value="1"
        oninput="setMaster(this.value)">

      <canvas id="masterVu" class="vu"></canvas>

    </div>
  `;

  mixer.appendChild(masterDiv);

  // TRACKS
  tracks.forEach((t, i) => {

    t.volume = 1;
    t.mute = false;
    t.solo = false;

    const div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
      <div class="strip-row">

        <div class="fader-col">

          <label>${t.name}</label>

          <input type="range"
            class="vertical"
            min="0" max="1" step="0.01"
            value="1"
            oninput="setVolume(${i}, this.value)">

          <div class="button-row">
            <button class="smallbtn" id="mute-${i}" onclick="toggleMute(${i})">Mute</button>
            <button class="smallbtn" id="solo-${i}" onclick="toggleSolo(${i})">Solo</button>
          </div>

        </div>

        <canvas id="vu-${i}" class="vu"></canvas>

      </div>
    `;

    mixer.appendChild(div);
  });
}

/* ---------------- AUDIO ---------------- */

function initAudio() {

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  const masterAnalyser = audioCtx.createAnalyser();
  masterAnalyser.fftSize = 1024;

  masterGain.connect(masterAnalyser);
  masterAnalyser.connect(audioCtx.destination);

  window.masterAnalyser = masterAnalyser;

  tracks.forEach((t, i) => {

    const audio = new Audio(t.file);

    const source = audioCtx.createMediaElementSource(audio);
    const gain = audioCtx.createGain();
    const analyser = audioCtx.createAnalyser();

    analyser.fftSize = 512;

    t.audio = audio;
    t.gain = gain;
    t.analyser = analyser;

    source.connect(gain);
    gain.connect(analyser);
    analyser.connect(masterGain);

    audio.addEventListener("loadedmetadata", () => {
      duration = Math.max(duration, audio.duration);
      document.getElementById("scrubber").max = duration;
    });
  });
}

/* ---------------- MIX ---------------- */

function updateMix() {

  const anySolo = tracks.some(t => t.solo);

  tracks.forEach(t => {

    let level = t.volume;

    if (anySolo && !t.solo) level = 0;
    if (t.mute) level = 0;

    if (t.gain) {
      t.gain.gain.value = level;
    }
  });

  updateButtonUI();
}

function setVolume(i, v) {
  tracks[i].volume = parseFloat(v);
  updateMix();
}

/* ---------------- BUTTONS ---------------- */

function toggleMute(i) {
  tracks[i].mute = !tracks[i].mute;
  updateMix();
}

function toggleSolo(i) {
  tracks[i].solo = !tracks[i].solo;
  updateMix();
}

function updateButtonUI() {

  const anySolo = tracks.some(t => t.solo);

  tracks.forEach((t, i) => {

    const muteBtn = document.getElementById(`mute-${i}`);
    const soloBtn = document.getElementById(`solo-${i}`);

    if (!muteBtn || !soloBtn) return;

    muteBtn.classList.toggle("muted", t.mute);
    soloBtn.classList.toggle("solo", t.solo);

    muteBtn.classList.toggle("solo-muted", anySolo && !t.solo);
  });
}

/* ---------------- TRANSPORT ---------------- */

function playAll() {

  if (!audioCtx) initAudio();
  audioCtx.resume();

  const offset = pauseTime || 0;
  startTime = audioCtx.currentTime - offset;

  tracks.forEach(t => {
    t.audio.currentTime = offset;
    t.audio.play();
  });

  isPlaying = true;

  updateMix();
  updateScrubber();
  drawVUMeters();
  drawMasterVU();
}

function pauseAll() {

  tracks.forEach(t => t.audio.pause());

  pauseTime = audioCtx.currentTime - startTime;
  isPlaying = false;
}

/* ---------------- SCRUBBER ---------------- */

function seekAll(v) {

  if (!audioCtx) return;

  const t = parseFloat(v);
  pauseTime = t;

  tracks.forEach(tr => tr.audio.currentTime = t);

  if (isPlaying) {
    startTime = audioCtx.currentTime - t;
  }
}

function updateScrubber() {

  if (!isPlaying) return;

  const scrubber = document.getElementById("scrubber");
  const current = audioCtx.currentTime - startTime;

  scrubber.value = Math.min(current, duration);

  requestAnimationFrame(updateScrubber);
}

/* ---------------- VU METERS ---------------- */

function drawVUMeters() {

  tracks.forEach((t, i) => {

    if (!t.analyser) return;

    const canvas = document.getElementById(`vu-${i}`);
    if (!canvas) return;

    const ctx = canvas.getContext("2d");

    const data = new Uint8Array(t.analyser.fftSize);
    t.analyser.getByteTimeDomainData(data);

    let sum = 0;

    for (let j = 0; j < data.length; j++) {
      const v = (data[j] - 128) / 128;
      sum += v * v;
    }

    const rms = Math.sqrt(sum / data.length);
    const level = Math.min(rms * 3.5, 1);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle =
      level > 0.8 ? "#e74c3c" :
      level > 0.5 ? "#f1c40f" :
                    "#2ecc71";

    ctx.fillRect(0, canvas.height - level * canvas.height, 12, level * canvas.height);
  });

  requestAnimationFrame(drawVUMeters);
}

function drawMasterVU() {

  if (!window.masterAnalyser) return;

  const canvas = document.getElementById("masterVu");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");

  const data = new Uint8Array(masterAnalyser.fftSize);
  masterAnalyser.getByteTimeDomainData(data);

  let sum = 0;

  for (let i = 0; i < data.length; i++) {
    const v = (data[i] - 128) / 128;
    sum += v * v;
  }

  const rms = Math.sqrt(sum / data.length);
  const level = Math.min(rms * 3.5, 1);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle =
    level > 0.85 ? "#e74c3c" :
    level > 0.55 ? "#f1c40f" :
                   "#2ecc71";

  ctx.fillRect(0, canvas.height - level * canvas.height, 12, level * canvas.height);

  requestAnimationFrame(drawMasterVU);
}

/* ---------------- MASTER ---------------- */

function setMaster(v) {
  if (masterGain) {
    masterGain.gain.value = parseFloat(v);
  }
}

</script>

</body>
</html>
