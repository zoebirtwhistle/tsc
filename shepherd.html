<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Shepherd</title>

<style>
  body {
    font-family: sans-serif;
    max-width: 800px;
    margin: 40px auto;
  }

  .channel {
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-bottom: 5px;
  }

  input[type=range] {
    width: 100%;
  }

  .controls {
    margin: 20px 0;
  }

  button {
    padding: 10px 15px;
    margin-right: 10px;
  }
</style>
</head>

<body>

<p><a href="index.html">Back</a></p>
<h1>Avril Coleridge-Taylor – <i>The Shepherd</i></h1>

<div class="controls">
  <button onclick="playAll()">Play</button>
  <button onclick="pauseAll()">Pause</button>

  <br><br>

  <label>Master Volume</label>
  <input type="range" id="master" min="0" max="1" step="0.01" value="1"
         oninput="setMaster(this.value)">

  <br><br>

  <label>Playback Position</label>
  <input type="range" id="scrubber" min="0" max="1" step="0.01" value="0"
         oninput="seekAll(this.value)">
</div>

<div id="mixer"></div>

<script>
const tracks = [
  { name: "Soprano", file: "shepherd_sop.mp3" },
  { name: "Alto", file: "shepherd_alto.mp3" },
  { name: "Tenor", file: "shepherd_tenor.mp3" },
  { name: "Bass", file: "shepherd_bass.mp3" },
  { name: "Piano", file: "shepherd_piano.mp3" }
];

let audioCtx;
let audioEls = [];
let gains = [];
let masterGain;

let isPlaying = false;
let startTime = 0;
let pauseTime = 0;
let duration = 0;

// --------------------
// UI BUILDS IMMEDIATELY
// --------------------
window.addEventListener("DOMContentLoaded", buildUI);

function buildUI() {
  tracks.forEach((t, i) => createFader(t.name, i));
}

// --------------------
// AUDIO INIT
// --------------------
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  tracks.forEach((track, i) => {
    const audio = new Audio(track.file);

    audio.addEventListener("loadedmetadata", () => {
      duration = Math.max(duration, audio.duration);
      document.getElementById("scrubber").max = duration;
    });

    const source = audioCtx.createMediaElementSource(audio);
    const gainNode = audioCtx.createGain();

    source.connect(gainNode);
    gainNode.connect(masterGain);

    audioEls.push(audio);
    gains.push(gainNode);
  });
}

// --------------------
// FADERS
// --------------------
function createFader(name, index) {
  const div = document.createElement("div");
  div.className = "channel";

  div.innerHTML = `
    <label>${name}</label>
    <input type="range" min="0" max="1" step="0.01" value="1"
      oninput="setGain(${index}, this.value)">
  `;

  document.getElementById("mixer").appendChild(div);
}

function setGain(i, v) {
  if (gains[i]) gains[i].gain.value = v;
}

// --------------------
// MASTER VOLUME
// --------------------
function setMaster(v) {
  if (masterGain) masterGain.gain.value = v;
}

// --------------------
// PLAYBACK
// --------------------
function playAll() {
  if (!audioCtx) initAudio();

  audioCtx.resume();

  const offset = pauseTime || 0;
  startTime = audioCtx.currentTime - offset;

  audioEls.forEach(a => {
    a.currentTime = offset;
    a.play();
  });

  isPlaying = true;
  updateScrubber();
}

function pauseAll() {
  audioEls.forEach(a => a.pause());

  pauseTime = audioCtx.currentTime - startTime;
  isPlaying = false;
}

// --------------------
// SCRUBBER]
// --------------------
function updateScrubber() {
  if (!isPlaying) return;

  const scrubber = document.getElementById("scrubber");

  const current = audioCtx.currentTime - startTime;

  scrubber.value = Math.min(current, duration);

  requestAnimationFrame(updateScrubber);
}

function seekAll(v) {
  if (!audioCtx) return;

  const t = parseFloat(v);

  pauseTime = t;

  audioEls.forEach(a => {
    a.currentTime = t;
  });

  if (isPlaying) {
    startTime = audioCtx.currentTime - t;
  }
}
</script>

</body>
</html>
