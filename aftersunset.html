<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>After Sunset</title>
<style>
  body {
    font-family: sans-serif;
    max-width: 800px;
    margin: 40px auto;
  }

  .channel {
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-bottom: 5px;
  }

  input[type=range] {
    width: 100%;
  }

  .controls {
    margin: 20px 0;
  }

  button {
    padding: 10px 15px;
    margin-right: 10px;
  }
</style>
</head>

<body>
<p></p><a href="index.html">Back</a></p>
<h1>Smyth – After Sunset</h1>

  <div class="controls">

  <button onclick="playAll()">Play</button>
  <button onclick="pauseAll()">Pause</button>

  <br><br>

  <label>Master Volume</label>
  <input type="range" id="master" min="0" max="1" step="0.01" value="1"
         oninput="setMaster(this.value)">

  <br><br>

  <label>Playback Position</label>
<input type="range" id="scrubber" min="0" max="120" step="0.01" value="0"
       oninput="seekAll(this.value)">
</div>
  
<div id="mixer"></div>
<script>
const tracks = [
  { name: "Soprano", file: "assop.mp3" },
  { name: "Alto", file: "asalto.mp3" },
  { name: "Tenor", file: "astenor.mp3" },
  { name: "Bass", file: "asbass.mp3" },
  { name: "Piano", file: "aspiano.mp3" }
];

let audioCtx;
let audioEls = [];
let gains = [];
let masterGain;

let isPlaying = false;
let startTime = 0;
let pauseTime = 0;

// --------------------
// UI BUILDS IMMEDIATELY
// --------------------
window.addEventListener("DOMContentLoaded", buildUI);

function buildUI() {
  tracks.forEach((track, i) => {
    createFader(track.name, i);
  });
}

// --------------------
// AUDIO INIT
// --------------------
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  tracks.forEach((track, i) => {
    const audio = new Audio(track.file);
    audio.crossOrigin = "anonymous";

    const source = audioCtx.createMediaElementSource(audio);
    const gainNode = audioCtx.createGain();

    source.connect(gainNode);
    gainNode.connect(masterGain);

    audioEls.push(audio);
    gains.push(gainNode);
  });
}

// --------------------
// FADERS
// --------------------
function createFader(name, index) {
  const container = document.createElement("div");
  container.className = "channel";

  container.innerHTML = `
    <label>${name}</label>
    <input type="range" min="0" max="1" step="0.01" value="1"
      oninput="setGain(${index}, this.value)">
  `;

  document.getElementById("mixer").appendChild(container);
}

function setGain(index, value) {
  if (gains[index]) {
    gains[index].gain.value = value;
  }
}

// --------------------
// MASTER VOLUME
// --------------------
function setMaster(value) {
  if (masterGain) {
    masterGain.gain.value = value;
  }
}

// --------------------
// PLAYBACK
// --------------------
function playAll() {
  if (!audioCtx) initAudio();
  audioCtx.resume();

  const offset = pauseTime || 0;
  startTime = audioCtx.currentTime - offset;

  audioEls.forEach(a => {
    a.currentTime = offset;
    a.play();
  });

  isPlaying = true;
  updateScrubber();
}

function pauseAll() {
  audioEls.forEach(a => a.pause());

  pauseTime = audioCtx.currentTime - startTime;
  isPlaying = false;
}

// --------------------
// SCRUBBER (FIXED)
// --------------------
function updateScrubber() {
  if (!isPlaying) return;

  const scrubber = document.getElementById("scrubber");

  const current = audioCtx.currentTime - startTime;

  scrubber.value = current;

  requestAnimationFrame(updateScrubber);
}

function seekAll(value) {
  if (!audioCtx) return;

  pauseTime = parseFloat(value);

  audioEls.forEach(a => {
    a.currentTime = pauseTime;
  });

  if (isPlaying) {
    startTime = audioCtx.currentTime - pauseTime;
  }
}
</script>

</body>
</html>
