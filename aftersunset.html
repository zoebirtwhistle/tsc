<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>After Sunset – Mixer</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 40px auto;
  text-align: center;
}

#scrubber {
  width: 100%;
  max-width: 600px;
}

.scrubber-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 10px;
}

button {
  padding: 10px 14px;
  margin: 5px;
}

#mixer {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.channel {
  display: grid;
  grid-template-columns: 50px max-content;
  grid-template-rows: auto 150px auto;
  gap: 1px;
  justify-items: center;
  align-items: center;
  padding: 2px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

  .track-name {
  grid-column: 1 / 3;
  font-weight: bold;
  margin-bottom: 4px;
}

.fader {
  grid-column: 1;
  grid-row: 2;
}

.meter {
  grid-column: 2;
  grid-row: 2;
}

.mute-btn {
  grid-column: 1;
  grid-row: 3;
}

.solo-btn {
  grid-column: 2;
  grid-row: 3;
}

input[type=range].vertical {
  transform: rotate(-90deg);
  width: 140px;
  height: 25px;
  margin: 10px 0;
}

.smallbtn {
  width: auto;
  padding: 2px 6px;
  font-size: 11px;
  background: #eee;
  border: 1px solid #aaa;
  cursor: pointer;
}

.smallbtn.muted {
  background: #2ecc71;
  color: white;
}

.smallbtn.solo {
  background: #f1c40f;
  color: black;
}

.smallbtn.solo-muted {
  background: #2ecc71;
  opacity: 0.5;
  color: white;
}

.vu {
  width: 12px;
  height: 140px;
  background: #222;
  border-radius: 2px;
  overflow: hidden;
}
</style>
</head>

<body>

<p><a href="index.html"><b>Back</b></a></p>
<h1>Ethel Smyth – <i>After Sunset</i></h1>

<div class="controls">

  <button onclick="playAll()">Play</button>
  <button onclick="pauseAll()">Pause</button>
<button><a href="Smyth - After Sunset SATB Vocal Score.pdf">Download score</a></button>
  <br><br>

<div class="scrubber-block">
  <label>Playback Position</label><br>
  <input type="range" id="scrubber"
         min="0" max="1" step="0.01" value="0"
         oninput="seekAll(this.value)">
</div>
  
</div>

<div id="mixer"></div>
<h1>Ethel Smyth – <i>After Sunset</i></h1>

<button onclick="playAll()">Play</button>
<button onclick="pauseAll()">Pause</button>

<div class="scrubber-block">
  <label>Playback Position</label>
  <input type="range" id="scrubber" min="0" max="1" step="0.01"
         oninput="seekAll(this.value)">
</div>

<div id="mixer"></div>

<script>

const tracks = [
  { name: "Soprano", file: "assop.mp3" },
  { name: "Alto", file: "asalto.mp3" },
  { name: "Tenor", file: "astenor.mp3" },
  { name: "Bass", file: "asbass.mp3" },
  { name: "Piano", file: "aspiano.mp3" }
];

const DEFAULT_VOL = 0.8;

let audioCtx;
let masterGain;
let duration = 0;

let isPlaying = false;
let startTime = 0;
let pauseTime = 0;

window.addEventListener("DOMContentLoaded", buildUI);

/* ---------------- UI ---------------- */

function buildUI() {
  const mixer = document.getElementById("mixer");

  tracks.forEach((t, i) => {

    t.volume = DEFAULT_VOL;
    t.mute = false;
    t.solo = false;

    const div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
  <div class="track-name">${t.name}</div>

  <input class="vertical fader"
    type="range"
    min="0" max="1" step="0.01"
    value="${DEFAULT_VOL}"
    oninput="setVolume(${i}, this.value)">

  <canvas id="vu-${i}" class="vu meter" width="12" height="140"></canvas>

<button class="smallbtn mute-btn" id="mute-${i}" onclick="toggleMute(${i})">
  Mute
</button>

<button class="smallbtn solo-btn" id="solo-${i}" onclick="toggleSolo(${i})">
  Solo
</button>
`;
    mixer.appendChild(div);
  });
}

/* ---------------- AUDIO ---------------- */

function initAudio() {

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  tracks.forEach((t) => {

    const audio = new Audio(t.file);

    const source = audioCtx.createMediaElementSource(audio);

    const gain = audioCtx.createGain();
    const analyser = audioCtx.createAnalyser();

    analyser.fftSize = 1024;

    t.audio = audio;
    t.gain = gain;
    t.analyser = analyser;
    source.connect(gain);
    gain.connect(analyser);
    analyser.connect(masterGain);

    audio.addEventListener("loadedmetadata", () => {
      duration = Math.max(duration, audio.duration);
      document.getElementById("scrubber").max = duration;
    });
  });

  applyAudioState();
  drawVUMeters();
}

/* ---------------- SINGLE SOURCE OF TRUTH ---------------- */

function applyAudioState() {

  const anySolo = tracks.some(t => t.solo);

  tracks.forEach(t => {

    let level = t.volume;

    if (anySolo) {
      level = t.solo ? level : 0;
    }

    if (t.mute) {
      level = 0;
    }

    if (t.gain) {
      t.gain.gain.value = level;
    }
  });

  updateButtonUI();
}

/* ---------------- CONTROLS ---------------- */

function setVolume(i, v) {
  tracks[i].volume = parseFloat(v);
  applyAudioState();
}

function toggleMute(i) {
  tracks[i].mute = !tracks[i].mute;
  applyAudioState();
}

function toggleSolo(i) {
  tracks[i].solo = !tracks[i].solo;
  applyAudioState();
}

/* ---------------- PLAYBACK ---------------- */

function playAll() {

  if (!audioCtx) initAudio();

  applyAudioState();

  audioCtx.resume();

  const offset = pauseTime || 0;
  startTime = audioCtx.currentTime - offset;

  tracks.forEach(t => {
    t.audio.currentTime = offset;
    t.audio.play();
  });

  isPlaying = true;
  updateScrubber();

}

function pauseAll() {

  tracks.forEach(t => t.audio.pause());

  pauseTime = audioCtx.currentTime - startTime;
  isPlaying = false;
}

/* ---------------- SCRUBBER ---------------- */

function seekAll(v) {

  if (!audioCtx) return;

  const t = parseFloat(v);

  pauseTime = t;

  tracks.forEach(tr => tr.audio.currentTime = t);

  if (isPlaying) {
    startTime = audioCtx.currentTime - t;
  }
}

function updateScrubber() {

  if (!isPlaying) return;

  const scrubber = document.getElementById("scrubber");

  const current = audioCtx.currentTime - startTime;
  scrubber.value = Math.min(current, duration);

  requestAnimationFrame(updateScrubber);
}

/* ---------------- UI STATE ---------------- */

function updateButtonUI() {

  const anySolo = tracks.some(t => t.solo);

  tracks.forEach((t, i) => {

    const muteBtn = document.getElementById(`mute-${i}`);
    const soloBtn = document.getElementById(`solo-${i}`);

    if (!muteBtn || !soloBtn) return;

    muteBtn.classList.toggle("muted", t.mute);
    soloBtn.classList.toggle("solo", t.solo);

    muteBtn.classList.toggle("solo-muted", anySolo && !t.solo);
  });
}

/* ---------------- METERS ---------------- */
  
function drawVUMeters() {

  if (!audioCtx) {
    requestAnimationFrame(drawVUMeters);
    return;
  }

  tracks.forEach((t, i) => {

    if (!t.analyser) return;

    const canvas = document.getElementById(`vu-${i}`);
    if (!canvas) return;

    const ctx = canvas.getContext("2d");

    const data = new Uint8Array(t.analyser.fftSize);
    t.analyser.getByteTimeDomainData(data);

    let sum = 0;

    for (let j = 0; j < data.length; j++) {
      const v = (data[j] - 128) / 128;
      sum += v * v;
    }

    const rms = Math.sqrt(sum / data.length);

    const level = Math.max(rms * 8, 0.02);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle =
      level > 0.8 ? "#e74c3c" :
      level > 0.5 ? "#f1c40f" :
                    "#2ecc71";

    const h = level * canvas.height;

    ctx.fillRect(0, canvas.height - h, canvas.width, h);
  });

  requestAnimationFrame(drawVUMeters);
}

</script>

</body>
</html>
