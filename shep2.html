<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Shepherd – Mixer</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 40px auto;
  text-align: center;
}

#scrubber {
  width: 100%;
  max-width: 600px;
}

.scrubber-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 10px;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border: 1px solid #aaa;
  background: #eee;
  font-size: 13px;
  cursor: pointer;
  box-shadow: 2px 2px 0px #bbb;
  transition: all 0.05s ease;
}

button.active {
  background: #ddd;
  box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2);
  transform: translate(1px, 1px);
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

#mixer {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.channel {
  display: grid;
  grid-template-columns: 50px max-content;
  grid-template-rows: auto 150px auto;
  gap: 1px;
  justify-items: center;
  align-items: center;
  padding: 2px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

  .track-name {
  grid-column: 1 / 3;
  font-weight: bold;
  margin-bottom: 4px;
  margin-top: 4px;
}

.fader {
  grid-column: 1;
  grid-row: 2;
}

.meter {
  grid-column: 2;
  grid-row: 2;
}

.mute-btn {
  grid-column: 1;
  grid-row: 3;
}

.solo-btn {
  grid-column: 2;
  grid-row: 3;
}

input[type=range].vertical {
  transform: rotate(-90deg);
  width: 140px;
  height: 30px;
  margin: 10px 0;
}

.smallbtn {
  width: auto;
  padding: 2px 6px;
  font-size: 11px;
  background: #eee;
  border: 1px solid #aaa;
  cursor: pointer;
}

.smallbtn.muted {
  background: #2ecc71;
  color: white;
}

.smallbtn.solo {
  background: #f1c40f;
  color: black;
}

.smallbtn.solo-muted {
  background: #2ecc71;
  opacity: 0.5;
  color: white;
}

.vu {
  width: 12px;
  height: 140px;
  background: #222;
  border-radius: 2px;
  overflow: hidden;
}
</style>
</head>

<body>

<p><a href="index.html"><b>Back</b></a></p>
<h1>Avril Coleridge-Taylor – <i>The Shepherd</i></h1>

<div class="controls">

<button id="playBtn" onclick="playAll()" disabled>▶ Play</button>
<button id="pauseBtn" onclick="pauseAll()">⏸ Pause</button>
<button onclick="window.location.href='theshepherd/The Shepherd SATB.pdf'">
  Download score
</button>
  <br><br>

<div class="scrubber-block">
  <label>Playback Position</label><br>
  <input type="range" id="scrubber"
         min="0" max="1" step="0.01" value="0"
         oninput="seekAll(this.value)">
</div>
  
</div>

<div id="mixer"></div>
<p font-size: 11px>This tool is still a bit jank and occasionally the tracks get misaligned during playback.<br>
  A <a href=".">page refresh</a> usually fixes the error.</p>
<script>

const tracks = [
  { name: "Soprano", file: "theshepherd/sop.mp3" },
  { name: "Alto", file: "theshepherd/alto.mp3" },
  { name: "Tenor", file: "theshepherd/tenor.mp3" },
  { name: "Bass", file: "theshepherd/bass.mp3" },
  { name: "Piano", file: "theshepherd/piano.mp3" }
];

const DEFAULT_VOL = 0.8;

let audioCtx;
let masterGain;
let duration = 0;

let isPlaying = false;
let startTime = 0;
let pauseTime = 0;

let tracksReady = 0;
let allReady = false;

let vuAnimation = null;

let transport = "loading"; // loading | ready | playing | paused

let syncInterval = null;
const SYNC_THRESHOLD = 0.02;
const MAX_RATE_ADJUST = 0.01;
const SYNC_INTERVAL_MS = 200;

window.addEventListener("DOMContentLoaded", buildUI);

function buildUI() {
  const mixer = document.getElementById("mixer");

  tracks.forEach((t, i) => {

    t.volume = DEFAULT_VOL;
    t.mute = false;
    t.solo = false;

    const div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
  <div class="track-name">${t.name}</div>

  <input class="vertical fader"
    type="range"
    min="0" max="1" step="0.01"
    value="${DEFAULT_VOL}"
    oninput="setVolume(${i}, this.value)">

  <canvas id="vu-${i}" class="vu meter" width="12" height="140"></canvas>

<button class="smallbtn mute-btn" id="mute-${i}" onclick="toggleMute(${i})">
  Mute
</button>

<button class="smallbtn solo-btn" id="solo-${i}" onclick="toggleSolo(${i})">
  Solo
</button>
`;
    mixer.appendChild(div);
  });
}

function initAudio() {

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  tracks.forEach((t, i) => {

    const audio = new Audio(t.file);

    t.audio = audio;

    const source = audioCtx.createMediaElementSource(audio);
    const gain = audioCtx.createGain();
    const analyser = audioCtx.createAnalyser();

    analyser.fftSize = 1024;

    t.gain = gain;
    t.analyser = analyser;

    source.connect(gain);
    gain.connect(analyser);
    analyser.connect(masterGain);

    audio.addEventListener("canplaythrough", () => {
  if (t._ready) return;
  t._ready = true;

  tracksReady++;

  duration = Math.max(duration, audio.duration);
  document.getElementById("scrubber").max = duration;

  if (tracksReady >= tracks.length) {
    allReady = true;
    transport = "ready";

    setTimeout(() => {
  if (!allReady) {
    console.warn("Forcing transport ready (timeout fallback)");

    allReady = true;
    transport = "ready";

    const playBtn = document.getElementById("playBtn");
    if (playBtn) {
      playBtn.disabled = false;
      playBtn.textContent = "▶ Play";
    }
  }
}, 5000);

    const playBtn = document.getElementById("playBtn");
    if (playBtn) {
      playBtn.disabled = false;
      playBtn.textContent = "▶ Play";
    }
  }
});

  });

  applyAudioState();
  drawVUMeters();
}

function applyAudioState() {

  const anySolo = tracks.some(t => t.solo);

  tracks.forEach(t => {

    let level = t.volume;

    if (anySolo) {
      level = t.solo ? level : 0;
    }

    if (t.mute) {
      level = 0;
    }

    if (t.gain) {
      t.gain.gain.value = level;
    }
  });

  updateButtonUI();
}

function setVolume(i, v) {
  tracks[i].volume = parseFloat(v);
  applyAudioState();
}

function toggleMute(i) {
  tracks[i].mute = !tracks[i].mute;
  applyAudioState();
}

function toggleSolo(i) {
  tracks[i].solo = !tracks[i].solo;
  applyAudioState();
}
function updateTransportUI() {
  const playBtn = document.getElementById("playBtn");
  const pauseBtn = document.getElementById("pauseBtn");

  if (!playBtn || !pauseBtn) return;

  playBtn.classList.toggle("active", isPlaying);
  pauseBtn.classList.toggle("active", !isPlaying);
}

function playAll() {

  if (!allReady) return;
  if (transport === "loading") return;
  if (!audioCtx) initAudio();

  audioCtx.resume();

  const offset = pauseTime || 0;
  startTime = audioCtx.currentTime - offset;

  tracks.forEach(t => {
  t.audio.currentTime = offset;
  t.audio.playbackRate = 1.0;
  t.audio.play();
});
vuAnimation = requestAnimationFrame(drawVUMeters);

  isPlaying = true;
  transport = "playing";
  updateTransportUI()
  
  if (syncInterval) clearInterval(syncInterval);
  syncInterval = setInterval(syncTracks, SYNC_INTERVAL_MS);
  
  updateScrubber();
  
  const playBtn = document.getElementById("playBtn");
  if (playBtn) {
    playBtn.textContent = "⏸ Playing";
  }  
}

function pauseAll() {

  tracks.forEach(t => t.audio.pause());

  pauseTime = audioCtx.currentTime - startTime;
  isPlaying = false;

  transport = "paused";
  updateTransportUI()

  if (syncInterval) {
  clearInterval(syncInterval);
  syncInterval = null;
}

  const playBtn = document.getElementById("playBtn");
  if (playBtn) {
    playBtn.textContent = "▶ Play";
  }
}

function seekAll(v) {

  if (!audioCtx) return;

  const t = parseFloat(v);

  pauseTime = t;

  tracks.forEach(tr => tr.audio.currentTime = t);

  if (isPlaying) {
    startTime = audioCtx.currentTime - t;
  }
}

function updateScrubber() {

  if (!isPlaying) return;

  const scrubber = document.getElementById("scrubber");

  const current = audioCtx.currentTime - startTime;
  scrubber.value = Math.min(current, duration);

  requestAnimationFrame(updateScrubber);
}

function updateButtonUI() {

  const anySolo = tracks.some(t => t.solo);

  tracks.forEach((t, i) => {

    const muteBtn = document.getElementById(`mute-${i}`);
    const soloBtn = document.getElementById(`solo-${i}`);

    if (!muteBtn || !soloBtn) return;

    muteBtn.classList.toggle("muted", t.mute);
    soloBtn.classList.toggle("solo", t.solo);

    muteBtn.classList.toggle("solo-muted", anySolo && !t.solo);
  });
}

function syncTracks() {

  if (!isPlaying) return;
  if (!tracks[0]?.audio) return;

  const reference = tracks[0]?.audio?.currentTime;
  const reference = referenceTrack?.audio.currentTime;

  for (let i = 1; i < tracks.length; i++) {

    const t = tracks[i];
    if (!t.audio) continue;

    const drift = t.audio.currentTime - reference;

    if (Math.abs(drift) < SYNC_THRESHOLD) {
      t.audio.playbackRate = 1.0;
      continue;
    }

    const direction = drift > 0 ? -1 : 1;

    const correction = Math.min(
      MAX_RATE_ADJUST,
      Math.abs(drift) * 0.5
    );

    t.audio.playbackRate = 1 + (direction * correction);
  }
}

function drawVUMeters() {

  tracks.forEach((t, i) => {

    if (!t.analyser) return;

    const canvas = document.getElementById(`vu-${i}`);
    if (!canvas) return;

    const ctx = canvas.getContext("2d");

    const data = t.timeData;
    t.analyser.getByteTimeDomainData(data);

    let sum = 0;

    for (let j = 0; j < data.length; j++) {
      const v = (data[j] - 128) / 128;
      sum += v * v;
    }

    const rms = Math.sqrt(sum / data.length);
    const level = Math.max(rms * 8, 0.02);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle =
      level > 0.8 ? "#e74c3c" :
      level > 0.5 ? "#f1c40f" :
                    "#2ecc71";

    ctx.fillRect(0, canvas.height - level * canvas.height, canvas.width, level * canvas.height);
  });

  requestAnimationFrame(drawVUMeters);
}

</script>

</body>
</html>
